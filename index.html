<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="style.css" />
		<script src="popup.js" defer></script>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
	</head>
	<body>
		<div class="container">
			<span class="title">2X speed</span>

			<p
				style="
					font-size: 16px;
					color: #6b6a6a;
					margin-top: 10px;
					text-align: center;
				"
			>
				Press
				<kbd
					style="
						background-color: #eee;
						border: 1px solid #ccc;
						border-radius: 4px;
						padding: 2px 6px;
						font-size: 16px;
						font-weight: 600;
						color: #0b0808;
					"
					>V</kbd
				>
				on your keyboard to activate the extension
			</p>
		</div>
	</body>
</html>
